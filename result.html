<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student's result checker</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div>
    <h2 class="h">Student Grade Checker</h2>
    <p>------------------💥-----------------</p>
    <label for="N">Full Name:</label>
    <input type="text" id="N" placeholder="Full Name">
    <label for="M">Marks:</label>
    <input type="number" id="M" placeholder="Marks here">
    <h2 id="result"></h2>
    <button class="submit" onclick="check()">submit</button>
    </div>
    <script>
        function check()
           {
            let marks=document.getElementById('M').value;
    if(marks>=80 && marks<=100)
{
    document.getElementById('result').innerHTML="'Grade A1'";
} 
else if(marks>=70 && marks<80)
{
document.getElementById('result').innerHTML="'Grade A'";
}
else if(marks>=60 && marks<70)
{
document.getElementById('result').innerHTML="'Grade B'";
}
else if(marks>50 && marks<60)
{
document.getElementById('result').innerHTML="'Grade c'";
}
else if(marks<=50 && marks>0)
{
document.getElementById('result').innerHTML="'Fail'";
}
else{
    document.getElementById('result').innerHTML="'Invalid response'";
}
    }
    </script>
</body>
</html>
